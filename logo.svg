<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="500" height="500">
  <defs>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563eb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e40af;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- White background -->
  <rect width="500" height="500" fill="#ffffff"/>

  <!-- Blue circle -->
  <circle cx="250" cy="230" r="170" fill="url(#blueGrad)"/>

  <!-- CA text centered -->
  <text x="250" y="262" text-anchor="middle" font-family="'Helvetica Neue', 'Arial', sans-serif" font-size="140" font-weight="700" fill="#ffffff" letter-spacing="8">CA</text>

  <!-- CHARTERED ACCOUNTANT below circle -->
  <text x="250" y="440" text-anchor="middle" font-family="'Helvetica Neue', 'Arial', sans-serif" font-size="18" font-weight="500" fill="#1e3a8a" letter-spacing="12">CHARTERED</text>
  <text x="250" y="468" text-anchor="middle" font-family="'Helvetica Neue', 'Arial', sans-serif" font-size="18" font-weight="500" fill="#1e3a8a" letter-spacing="10">ACCOUNTANT</text>

</svg>
