backend:
  name: git-gateway
  branch: master

media_folder: uploads
public_folder: /uploads

collections:
  - name: blog
    label: Blog Posts
    files:
      - label: All Blog Posts
        name: posts
        file: data/posts.json
        fields:
          - label: Posts
            name: posts
            widget: list
            summary: "{{fields.title}} — {{fields.date}}"
            fields:
              - { label: Title, name: title, widget: string }
              - { label: Slug, name: slug, widget: string, hint: "URL-friendly, no spaces. e.g. gst-tips-for-small-business" }
              - { label: Date, name: date, widget: datetime, format: "YYYY-MM-DD" }
              - label: Category
                name: category
                widget: select
                options:
                  - Tax Updates
                  - GST News
                  - Business Tips
                  - Financial Planning
                  - Income Tax
                  - FEMA & RBI
              - { label: Excerpt, name: excerpt, widget: text, hint: "Short description shown on blog listing page" }
              - { label: Content, name: content, widget: markdown }
