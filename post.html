<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog | PATEL PARTH & CO</title>
    <meta name="description" content="Read expert tax and financial insights from PATEL PARTH & CO.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Sora:wght@600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        .post-wrapper {
            max-width: 780px;
            margin: 0 auto;
            padding: 60px 0 80px;
        }
        .post-meta {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }
        .post-category {
            display: inline-block;
            background: rgba(232, 168, 56, 0.12);
            color: var(--accent);
            padding: 4px 14px;
            border-radius: var(--radius-full);
            font-size: 0.78rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.06em;
        }
        .post-date {
            color: var(--text-light);
            font-size: 0.88rem;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .post-title {
            font-family: var(--font-heading);
            font-size: 2.2rem;
            font-weight: 800;
            color: var(--text);
            line-height: 1.3;
            margin-bottom: 16px;
        }
        .post-excerpt {
            font-size: 1.08rem;
            color: var(--text-mid);
            line-height: 1.7;
            margin-bottom: 36px;
            padding-bottom: 36px;
            border-bottom: 1px solid var(--border);
        }
        .post-content {
            color: var(--text);
            font-size: 1rem;
            line-height: 1.85;
        }
        .post-content h2 {
            font-family: var(--font-heading);
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text);
            margin: 36px 0 14px;
        }
        .post-content h3 {
            font-family: var(--font-heading);
            font-size: 1.2rem;
            font-weight: 600;
            color: var(--primary);
            margin: 28px 0 10px;
        }
        .post-content p { margin-bottom: 18px; }
        .post-content ul, .post-content ol {
            padding-left: 24px;
            margin-bottom: 18px;
        }
        .post-content li { margin-bottom: 8px; }
        .post-content strong { color: var(--text); font-weight: 600; }
        .post-content a { color: var(--accent); text-decoration: underline; }
        .post-cta-box {
            background: var(--gradient-hero);
            border-radius: var(--radius-lg);
            padding: 36px;
            text-align: center;
            margin-top: 56px;
        }
        .post-cta-box h4 {
            font-family: var(--font-heading);
            font-size: 1.3rem;
            color: #fff;
            margin-bottom: 8px;
        }
        .post-cta-box p {
            color: rgba(255,255,255,0.7);
            margin-bottom: 20px;
            font-size: 0.95rem;
        }
        .post-not-found {
            text-align: center;
            padding: 100px 20px;
        }
        .post-not-found i {
            font-size: 3rem;
            color: var(--accent);
            margin-bottom: 16px;
            display: block;
        }
        @media (max-width: 768px) {
            .post-title { font-size: 1.6rem; }
            .post-wrapper { padding: 40px 0 60px; }
        }
    </style>
</head>
<body>

    <!-- Preloader -->
    <div id="preloader">
        <div class="loader-ring">
            <div class="loader-inner"></div>
            <span class="loader-text">PP&Co</span>
        </div>
    </div>

    <!-- Cursor Glow -->
    <div class="cursor-glow" id="cursorGlow"></div>

    <!-- Navigation -->
    <header id="navbar" class="scrolled">
        <div class="container nav-container">
            <a href="index.html" class="logo">
                <img src="logo.jpeg" alt="PATEL PARTH & CO" class="logo-img">
            </a>
            <nav class="nav-menu" id="navMenu">
                <a href="index.html" class="nav-link">Home</a>
                <a href="index.html#about" class="nav-link">About</a>
                <a href="index.html#services" class="nav-link">Services</a>
                <a href="index.html#why-us" class="nav-link">Why Us</a>
                <a href="index.html#testimonials" class="nav-link">Reviews</a>
                <a href="blog.html" class="nav-link active">Blog</a>
                <a href="index.html#contact" class="nav-link">Contact</a>
            </nav>
            <div class="nav-actions">
                <a href="tel:+918320525187" class="nav-cta">
                    <i class="fas fa-phone-alt"></i>
                    <span>Call Now</span>
                </a>
                <button class="hamburger" id="hamburger" aria-label="Toggle menu">
                    <span></span><span></span><span></span>
                </button>
            </div>
        </div>
    </header>

    <!-- Post Content -->
    <div style="padding-top: 80px;">
        <div class="container">
            <div class="post-wrapper" id="postContent">
                <!-- Loaded by JS -->
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <div class="footer-bottom">
                <p>&copy; 2026 PATEL PARTH & CO. All Rights Reserved.</p>
            </div>
        </div>
    </footer>

    <!-- WhatsApp Float -->
    <a href="https://wa.me/918320525187" class="whatsapp-float" target="_blank" aria-label="Chat on WhatsApp">
        <i class="fab fa-whatsapp"></i>
        <span class="wa-tooltip">Chat with us</span>
    </a>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="script.js"></script>
    <script>
        const slug = new URLSearchParams(window.location.search).get('slug');
        const container = document.getElementById('postContent');

        if (!slug) {
            window.location.href = 'blog.html';
        } else {
            fetch('/data/posts.json')
                .then(res => res.json())
                .then(data => {
                    const post = (data.posts || []).find(p => p.slug === slug);
                    if (!post) {
                        container.innerHTML = `
                            <div class="post-not-found">
                                <i class="fas fa-file-times"></i>
                                <h3>Post not found</h3>
                                <p>This post may have been removed or the link is incorrect.</p>
                                <a href="blog.html" class="btn btn-glow" style="margin-top:20px;display:inline-flex;">
                                    Back to Blog <i class="fas fa-arrow-right"></i>
                                </a>
                            </div>`;
                        return;
                    }

                    document.title = `${post.title} | PATEL PARTH & CO`;

                    container.innerHTML = `
                        <a href="blog.html" class="back-link"><i class="fas fa-arrow-left"></i> All Posts</a>
                        <div class="post-meta" style="margin-top:20px;">
                            <span class="post-category">${post.category}</span>
                            <span class="post-date">
                                <i class="fas fa-calendar-alt"></i>
                                ${new Date(post.date).toLocaleDateString('en-IN', { day: 'numeric', month: 'long', year: 'numeric' })}
                            </span>
                        </div>
                        <h1 class="post-title">${post.title}</h1>
                        <p class="post-excerpt">${post.excerpt}</p>
                        <div class="post-content">${marked.parse(post.content)}</div>
                        <div class="post-cta-box">
                            <h4>Need Expert Advice?</h4>
                            <p>Contact PATEL PARTH & CO for a free consultation today.</p>
                            <div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap;">
                                <a href="index.html#contact" class="btn btn-glow">Get Free Consultation <i class="fas fa-arrow-right"></i></a>
                                <a href="tel:+918320525187" class="btn btn-ghost"><i class="fas fa-phone-alt"></i> Call Now</a>
                            </div>
                        </div>`;
                })
                .catch(() => {
                    container.innerHTML = `
                        <div class="post-not-found">
                            <i class="fas fa-exclamation-circle"></i>
                            <h3>Unable to load post</h3>
                            <a href="blog.html" class="btn btn-glow" style="margin-top:20px;display:inline-flex;">Back to Blog</a>
                        </div>`;
                });
        }
    </script>
</body>
</html>
